<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VeriFy - Link Checker</title>
    <link rel="stylesheet" href="verify.css">
</head>
<body>
    <!-- Background Image -->
    <div class="background">
        <div class="container">
            <!-- Logo -->
            <div class="logo">
                <!-- <img src="verifylogo.jpeg" alt="VeriFy Logo" class="logo-img"> -->
                 <img src="../media/verifylogo.jpeg" alt="VeriFy Logo" class="logo-img">

                
                <h1>VeriFy</h1>
            </div>
            <!-- Search Bar -->                              
                           
            <div class="search-bar">
                <input type="text" id="urlInput" placeholder="Enter a URL to check">
                <button onclick="checkLink()">Check Link</button>
            </div>
            <!-- Result -->
            <div id="result"></div>
        </div>
    </div>

    <!-- Contact Us Section -->
    <div class="contact-us">
        <h2>Contact Us</h2>
        <p>For queries or support, email us at <a href="mailto:support@verify.com">support@verify.com</a>.</p>
    </div>

    <!-- Copyright -->
    <footer>
        <p>&copy; 2025 VeriFy. All rights reserved.</p>
    </footer>

    <script src="verify.js"></script>
</body>
</html>
